name: app_kebudyaan_lobar
description: "Aplikasi Kebudayaan Lombok Barat."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # === MEDIA & MAP ===
  image_picker: ^1.2.2
  youtube_player_flutter: ^9.0.1
  google_maps_flutter: ^2.17.0

  # === BAHASA & LOKALISASI ===
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  table_calendar: ^3.0.9

  # === UI & ICONS ===
  cupertino_icons: ^1.0.8
  carousel_slider: ^4.2.1
  shimmer: ^3.0.0
  google_fonts: ^6.3.3

  # === NETWORK & STATE ===
  http: ^1.6.0
  provider: ^6.1.2
  

  # === FIREBASE (STABIL & KOMPATIBEL) ===
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  firebase_storage: ^12.4.10
  cloud_firestore: ^5.6.12
  google_sign_in: ^6.3.0

  # === MAPS & LOKASI ===
  flutter_map: ^6.2.1
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  geocoding: ^3.0.0

  # === FITUR KHUSUS ===
  url_launcher: ^6.3.0
  share_plus: ^10.1.4
  flutter_tts: ^3.8.5
  wakelock_plus: ^1.4.0
  speech_to_text: ^7.0.0
  permission_handler: ^11.4.0

  # 🔥 FIX ERROR ML KIT (WAJIB)
  google_mlkit_language_id: ^0.13.0
  google_maps_cluster_manager: ^3.0.0

  # === SYSTEM & STORAGE ===
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^17.2.4
  device_info_plus: ^10.1.2
  onnxruntime: ^1.4.1
  flutter_map_marker_cluster: ^1.3.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

  # Tools
  flutter_launcher_icons: ^0.13.1
  flutter_gen: ^5.12.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/models/xgboost_model.onnx

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/apk.png"
  min_sdk_android: 21