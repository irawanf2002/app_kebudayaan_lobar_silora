name: Build Android APK

# Mengizinkan kita menekan tombol 'Run workflow' secara manual di web GitHub
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest # Menggunakan server Linux agar cepat dan ringan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK file
        uses: actions/upload-artifact@v3
        with:
          name: SIBUD-LOBAR-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk